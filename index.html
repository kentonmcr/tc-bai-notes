<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Notes</h1>

    <form id="add-form" class="add-form">
      <input
        type="text"
        id="title-input"
        placeholder="Title"
        autocomplete="off"
      >
      <textarea
        id="body-input"
        placeholder="Take a note..."
        rows="3"
      ></textarea>
      <div class="form-actions">
        <button type="submit">Add note</button>
        <button type="button" id="import-btn" class="secondary">Import notes</button>
      </div>
    </form>
    <input type="file" id="import-file-input" accept="application/json" hidden>

    <p id="empty-state" class="empty-state" hidden>
      No notes yet. Add your first one above.
    </p>

    <div id="bulk-actions" class="bulk-row" hidden>
      <input type="checkbox" id="select-all-checkbox" class="select-checkbox">
      <div class="bulk-actions-box">
        <span class="select-all-label">Select all</span>
        <span id="selected-count"></span>
        <button type="button" id="export-selected-btn" class="secondary">Export</button>
        <button type="button" id="delete-selected-btn" class="danger">Delete</button>
      </div>
    </div>

    <div id="notes-list" class="notes-list"></div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js" defer></script>
</body>
</html>
